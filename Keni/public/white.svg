<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#fffef7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8e4f8;stop-opacity:1"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="520" fill="url(#bg)"/>
  <!-- Soft circles decoration -->
  <circle cx="80"  cy="80"  r="50"  fill="#f0eeff" opacity="0.5"/>
  <circle cx="320" cy="70"  r="40"  fill="#fff0f8" opacity="0.5"/>
  <circle cx="50"  cy="380" r="60"  fill="#e8f8ff" opacity="0.4"/>
  <circle cx="360" cy="400" r="45"  fill="#fff8e0" opacity="0.4"/>
  <!-- Sparkles -->
  <text x="60"  y="70"  font-family="sans-serif" font-size="18" fill="#d0c0f0" opacity="0.7">✦</text>
  <text x="340" y="60"  font-family="sans-serif" font-size="14" fill="#f0c0d8" opacity="0.7">✦</text>
  <text x="30"  cy="260" font-family="sans-serif" font-size="12" fill="#c0d8f0" opacity="0.6">✦</text>
  <text x="370" y="300" font-family="sans-serif" font-size="16" fill="#d0f0c0" opacity="0.6">✦</text>
  <!-- Person silhouette (elegant) -->
  <ellipse cx="200" cy="145" rx="34" ry="36" fill="#c8b8e8" opacity="0.4"/>
  <path d="M 135,305 Q 200,245 265,305 L 275,435 Q 200,408 125,435 Z" fill="#d8c8f0" opacity="0.35"/>
  <!-- White star / sun -->
  <text x="200" y="200" font-family="sans-serif" font-size="68" text-anchor="middle" fill="#f0c860" filter="url(#soft)">⭐</text>
  <!-- Label -->
  <text x="200" y="358" font-family="Arial,sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#555" opacity="0.85">White Dress</text>
  <text x="200" y="398" font-family="Arial,sans-serif" font-size="16" text-anchor="middle" fill="rgba(80,60,120,0.45)">(Photo coming soon ✨)</text>
  <!-- Bottom decorations -->
  <text x="200" y="458" font-family="sans-serif" font-size="20" text-anchor="middle" fill="rgba(150,120,200,0.3)">✦ ✦ ✦</text>
</svg>
